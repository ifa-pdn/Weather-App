<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="outliner">
      <div class="container">
        <div class="search">
          <div class="country">
            <i class="fa-solid fa-earth-asia earth"></i>
            <select name="country" id="inputCountry" class="input-country">
              <option value="JP">Japan</option>
              <option value="ID">Indonesia</option>
              <option value="US">United States</option>
              <option value="GB">United Kingdom</option>
              <option value="KR">South Korea</option>
              <option value="CN">China</option>
              <option value="IN">India</option>
              <option value="DE">Germany</option>
              <option value="FR">France</option>
              <option value="IT">Italy</option>
              <option value="ES">Spain</option>
              <option value="CA">Canada</option>
              <option value="AU">Australia</option>
              <option value="BR">Brazil</option>
              <option value="MX">Mexico</option>
              <option value="NL">Netherlands</option>
              <option value="CH">Switzerland</option>
              <option value="SG">Singapore</option>
              <option value="TH">Thailand</option>
              <option value="MY">Malaysia</option>
              <option value="PH">Philippines</option>
              <option value="VN">Vietnam</option>
              <option value="AE">United Arab Emirates</option>
              <option value="SA">Saudi Arabia</option>
              <option value="TR">Turkey</option>
              <option value="RU">Russia</option>
              <option value="ZA">South Africa</option>
              <option value="SE">Sweden</option>
              <option value="NO">Norway</option>
              <option value="DK">Denmark</option>
            </select>
          </div>
          <form id="search" class="search-city" autocomplete="off">
            <label class="city-label" for="inputCity">
              <input
                type="text"
                name="city"
                id="inputCity"
                class="city-input"
                placeholder="Search City"
              />
              <i class="fa-solid fa-magnifying-glass search-glass"></i>
            </label>
            <div class="suggestions"></div>
          </form>
        </div>
        <div class="contents-loader">
          <span class="main-loader"></span>
        </div>
        <div class="main-content">
          <!-- Current Weather -->
          <div class="current-weather">
            <p class="city">Osaka</p>
            <p class="date-now"></p>
            <div class="weather-icon"></div>
            <p class="temperature">10°C</p>
            <p class="feels">Feels like <span class="feels-like">9°C</span></p>
            <p class="weather">Clouds</p>
          </div>
          <!-- Details -->
          <div class="details">
            <div class="item min">
              <i class="fa-solid fa-caret-down"></i>
              <span class="min-temp number">10°C</span>
            </div>
            <div class="item max">
              <i class="fa-solid fa-caret-up"></i>
              <span class="max-temp number">11°C</span>
            </div>
            <div class="item humi">
              <i class="fa-solid fa-droplet"></i>
              <span class="humidity number">52%</span>
            </div>
            <div class="item wind">
              <i class="fa-solid fa-wind"></i>
              <span class="wind-speed number">5.14</span>
            </div>
          </div>
          <!-- Hourly -->
          <div class="hourly">
            <div class="hourly-list a-day">
              <!-- JS akan render disini -->
            </div>
          </div>
          <!-- Daily -->
          <ul class="daily">
            <!-- JS render disini -->
          </ul>
        </div>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/472ab9d74f.js"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
