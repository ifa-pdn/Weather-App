<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <style>
      .bold {
        font-weight: bold;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <label>
      Country :<br />
      <select name="country" id="inputCountry">
        <option value="JP">Japan</option>
        <option value="ID">Indonesia</option>
        <option value="GB">England</option>
      </select>
    </label>
    <form id="search" autocomplete="off">
      <label>
        City :<br />
        <input type="text" name="city" id="inputCity" />
      </label>
      <ul class="suggestions"></ul>
      <!-- <button type="submit">Search</button> -->
    </form>
    <p class="error-message"></p>
    <!-- <p class="geocoding-error"></p> -->
    <p>City</p>
    <p class="city bold"></p>
    <p>Temperature</p>
    <p class="temperature bold"></p>
    <p>Feels like</p>
    <p class="feels-like bold"></p>
    <p>Max</p>
    <p class="max-temp bold"></p>
    <p>Min</p>
    <p class="min-temp bold"></p>
    <p>Weather</p>
    <p class="weather bold"></p>
    <p><img src="" alt="#" class="weather-icon" /></p>
    <p>Humidity</p>
    <p class="humidity bold"></p>
    <p>Wind speed</p>
    <p class="wind-speed bold"></p>
    <p>Daily</p>
    <ul class="daily bold"></ul>
    <script src="script.js"></script>
  </body>
</html>
